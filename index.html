<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>the boy - Defense Battle Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-page">
    <section class="game-wrap" aria-label="the boy defense game prototype">
      <div class="game-header">
        <div>
          <h1>the boy</h1>
          <p>Because of you · 2D 픽셀 디펜스 전투 프로토타입</p>
        </div>
        <div class="guide">
          1 근거리 / 2 원거리 · 지상 상하좌우 타일루트 / 공중 자유비행 · R 다시 시작
        </div>
      </div>

      <div class="canvas-frame">
        <canvas id="gameCanvas" width="960" height="640"></canvas>
      </div>

      <div class="dev-note">
        현재 단계: 왼쪽 위 회색 건물 스폰 / 오른쪽 아래 갈색 건물 도착 / 지상 적 상단·중앙·하단 타일 루트 / 공중 적 자유비행 / 근거리·원거리 전투 구현.
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
