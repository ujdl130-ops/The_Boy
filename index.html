  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>the boy - Defense Battle Prototype</title>
  <link rel="stylesheet" href="style.css?v=20260624-cost-system" />
</head>
<body>
  <main class="game-page">
    <section class="game-wrap" aria-label="the boy defense game prototype">
      <div class="game-header">
        <div>
          <h1>the boy</h1>
          <p>Because of you · 2D 픽셀 디펜스 전투 프로토타입</p>
        </div>
        <div class="guide">
          1 근거리(코스트1) / 2 원거리(코스트3) · R 다시 시작
        </div>
      </div>

      <div class="canvas-frame">
        <canvas id="gameCanvas" width="960" height="640"></canvas>
      </div>

      <div class="dev-note">
        현재 단계: 코스트 게이지 / 코스트 제한 배치 / 지상 적 상단·중앙·하단 타일 루트 / air1·air2 공중 적 / 원거리 유닛의 공중·지상 공격 구현.<br />
        GitHub Pages 캐시 방지 빌드: 20260624-cost-system
      </div>
    </section>
  </main>

  <script>
    // GitHub Pages에서 예전 sw.js / CacheStorage가 남아 있을 때 이전 script.js가 계속 보이는 문제를 줄입니다.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((registrations) => registrations.forEach((registration) => registration.unregister()))
        .catch(() => {});
    }

    if (window.caches) {
      caches.keys()
        .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
        .catch(() => {});
    }
  </script>
  <script src="script.js?v=20260624-cost-system"></script>
</body>
</html>
